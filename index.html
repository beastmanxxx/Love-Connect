<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveConnect – Find Love. Build Forever.</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #e91e8c;
      --pink-dark: #c0166f;
      --pink-light: #ff6eb4;
      --purple: #6a0572;
      --purple-dark: #3d0040;
      --cream: #fff5f9;
      --dark: #1a0020;
      --gray: #6b7280;
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(50px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25%       { transform: scale(1.15); }
      50%       { transform: scale(1); }
      75%       { transform: scale(1.1); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scrollMarquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-50%)); }
    }
    @keyframes crystalFall {
      0% { transform: translateY(-50px) rotate(0deg) scale(0.8); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(600px) rotate(360deg) scale(1.2); opacity: 0; }
    }

    .animate-in     { animation: fadeInUp 0.7s ease forwards; }
    .animate-left   { animation: fadeInLeft 0.7s ease forwards; }
    .animate-right  { animation: fadeInRight 0.7s ease forwards; }
    .animate-scale  { animation: scaleIn 0.6s ease forwards; }
    .animate-fade   { animation: fadeIn 0.8s ease forwards; }

    /* Main Splash Animations */
    @keyframes heartPump {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.3); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      70% { transform: scale(1); }
    }
    @keyframes connectFade {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes splashOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }

    .visible   { opacity: 1 !important; transform: translate(0, 0) scale(1) !important; }
    .invisible { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .invisible.from-left  { transform: translateX(-50px); }
    .invisible.from-right { transform: translateX(50px); }
    .invisible.from-scale { transform: scale(0.85); }

    /* ── NAVBAR ── */
    .navbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 48px;
      background: transparent;
      border-bottom: none;
      box-shadow: none;
      transition: background 0.3s, backdrop-filter 0.3s;
    }
    .navbar.scrolled {
      background: rgba(10,0,15,0.95);
      backdrop-filter: blur(10px);
      position: fixed;
    }
    .hamburger-btn, .mobile-menu { display: none !important; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { font-size: 32px; animation: heartBeat 2s infinite; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: white; }
    .logo-sub  { font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 0.5px; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      text-decoration: none; font-size: 14px; font-weight: 600; color: white;
      position: relative; transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--pink); transform: scaleX(0);
      transition: transform 0.3s; transform-origin: left;
    }
    .nav-links a:hover { color: var(--pink-light); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-links a.active { color: white; border-bottom: 2px solid var(--pink); }
    .btn-login {
      display: flex; align-items: center; gap: 8px;
      background: transparent; color: white; border: 1px solid var(--pink);
      padding: 10px 24px; border-radius: 25px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: all 0.3s;
    }
    .btn-login:hover { background: rgba(233,30,140,0.1); }
    .btn-login .icon { color: var(--pink); font-size: 16px; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; position: relative; overflow: hidden;
      display: flex; align-items: center; padding: 100px 5%;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      opacity: 0.9;
    }
    .hero-hearts { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .floating-heart {
      position: absolute; font-size: 24px; opacity: 0.8;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 5px rgba(255, 105, 180, 0.5));
    }
    .hero-content {
      position: relative; z-index: 10; width: 100%; max-width: 1200px;
      display: flex; flex-direction: column; align-items: flex-start;
    }
    .hero-left h1 {
      font-family: 'Playfair Display', serif; font-size: 56px; line-height: 1.1;
      font-weight: 700; color: var(--dark);
    }
    .trusted-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: white; border-radius: 20px; padding: 6px 16px;
      font-size: 13px; font-weight: 600; color: var(--gray);
      margin-bottom: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05);
    }
    .btn-join-today {
      background: var(--pink); color: white; border: none;
      padding: 14px 32px; border-radius: 30px; font-weight: 600; font-size: 16px;
      cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 20px rgba(233,30,140,0.3); transition: all 0.3s;
    }
    .btn-join-today:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(233,30,140,0.4); }
    
    .face-pile { display: flex; align-items: center; gap: 16px; }
    .face-pile .faces { display: flex; align-items: center; }
    .face-pile img {
      width: 40px; height: 40px; border-radius: 50%; border: 2px solid white;
      object-fit: cover; margin-left: -12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .face-pile img:first-child { margin-left: 0; }
    .face-pile-text { font-size: 12px; color: var(--gray); line-height: 1.3; }
    .face-pile-text strong { color: var(--dark); font-size: 13px; }
    .hero-left h1 {
      margin-bottom: 24px;
      animation: fadeInLeft 0.8s ease 0.2s both;
    }
    .hero-left h1 span { color: var(--pink-light); }
    .hero-left p {
      font-size: 18px; line-height: 1.6; color: rgba(255,255,255,0.9);
      margin-bottom: 40px; max-width: 480px;
      animation: fadeInLeft 0.8s ease 0.4s both;
    }
    .join-action {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 48px;
      animation: fadeInLeft 0.8s ease 0.6s both;
    }
    .btn-join {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--pink); color: white; border: none;
      padding: 16px 36px; border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 15px rgba(233,30,140,0.4);
      transition: all 0.3s;
    }
    .btn-join:hover { background: var(--pink-dark); transform: translateY(-2px); }
    .arrow-icon {
      height: 40px; opacity: 0.9; width: 100px;
    }
    .hero-badges {
      display: flex; gap: 24px; flex-wrap: wrap;
      animation: fadeInLeft 0.8s ease 0.8s both;
    }
    .badge {
      display: flex; align-items: center; gap: 12px;
      color: white; font-size: 12px; font-weight: 500;
      line-height: 1.3;
    }
    .badge-icon-wrapper {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(233,30,140,0.1); border: 1px solid rgba(233,30,140,0.5);
      display: flex; align-items: center; justify-content: center;
      color: var(--pink-light); font-size: 18px;
    }

    /* JOIN FORM COMMONS (Used in Login) */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 8px;
    }
    .form-group label .icon { color: var(--pink); font-size: 14px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 14px; outline: none; background: #fafafa;
      transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: var(--pink); background: white; }
    .btn-create {
      width: 100%; padding: 16px; border: none; border-radius: 8px;
      background: var(--pink);
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 4px 15px rgba(233,30,140,0.3);
      margin-top: 10px; margin-bottom: 20px;
    }
    .btn-create:hover { background: var(--pink-dark); transform: translateY(-2px); }
    .secure-note { text-align: center; font-size: 13px; font-weight: 600; color: var(--pink); display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* ── STATS BAR (NEW DESIGN) ── */
    .stats-bar-wrapper {
      position: relative; z-index: 10;
      margin-top: -60px; /* Overlap hero */
      width: 90vw; max-width: 1000px; margin-left: auto; margin-right: auto;
    }
    .stats-bar {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .stats-inner {
      width: 100%; margin: 0 auto;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
    }
    .stat-item { 
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px;
      position: relative; padding: 10px;
    }
    .stat-item:not(:last-child)::after {
      content: ''; position: absolute; right: -10px; top: 10%; bottom: 10%;
      width: 1px; background: rgba(0,0,0,0.05);
    }
    .stat-icon-wrapper {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: var(--pink); border: 1px solid rgba(233,30,140,0.1);
    }
    .stat-num {
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--dark); line-height: 1.2;
    }
    .stat-label { font-size: 12px; color: var(--gray); line-height: 1.4; }

    /* ── SECTION COMMONS ── */
    .section { padding: 80px 48px; }
    .section-max { width: 90vw; max-width: none; margin: 0 auto; }
    .eyebrow { text-align: center; color: var(--pink); font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px; font-weight: 700; text-align: center; color: var(--dark);
      margin-bottom: 8px;
    }
    .title-accent {
      display: block; width: 60px; height: 3px;
      background: linear-gradient(to right, var(--pink), var(--pink-light));
      margin: 14px auto 48px; border-radius: 4px;
    }

    /* ── PROFILES ── */
    .profiles-section { background: #fffafb; }
    .profiles-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 36px;
    }
    .btn-view-all {
      border: 1px solid rgba(233,30,140,0.3); color: var(--pink); background: white;
      padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 10px rgba(233,30,140,0.05);
    }
    .btn-view-all:hover { background: var(--pink); color: white; border-color: var(--pink); transform: translateY(-2px); }
    .heart-divider {
      display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;
    }
    .heart-divider::before, .heart-divider::after {
      content: ''; width: 30px; height: 1.5px; background: rgba(233,30,140,0.3);
    }
    .heart-divider-icon { color: var(--pink); font-size: 14px; }
    .btn-outline-pink {
      background: transparent; border: 1.5px solid var(--pink); color: var(--pink);
      padding: 10px 24px; border-radius: 30px; font-weight: 600; font-size: 14px;
      cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-outline-pink:hover { background: var(--pink); color: white; }
    .btn-outline-pink.wide { padding: 14px 40px; font-size: 15px; border-radius: 40px; }
    
    .btn-filter {
      background: white; border: 1px solid var(--pink); color: var(--pink);
      padding: 6px 16px; border-radius: 8px; font-weight: 600; font-size: 14px;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
    }

    .online-dot {
      position: absolute; top: 12px; left: 12px; width: 12px; height: 12px;
      background: #00d26a; border-radius: 50%; border: 2px solid white; z-index: 10;
    }
    .heart-btn-circle {
      position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
      background: white; border-radius: 50%; border: none; color: var(--pink);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 10;
      transition: transform 0.2s;
    }
    .heart-btn-circle:hover { transform: scale(1.1); }

    .profiles-grid.permanent-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; width: 100%;
    }
    .profile-card.new-style { 
      background: #111; aspect-ratio: auto; height: 420px; border-radius: 12px; 
      overflow: hidden; position: relative; transition: all 0.4s; box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
    }
    .profile-card.new-style:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(233,30,140,0.25); }
    .profile-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    .profile-overlay-new {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
    }
    .profile-name-new { font-weight: 700; font-size: 20px; color: white; display: flex; align-items: center; gap: 6px; }
    .verified-badge { background: var(--pink); color: white; width: 16px; height: 16px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
    .profile-profession { font-size: 13px; color: rgba(255,255,255,0.9); margin-top: 4px; }
    .profile-loc-new { font-size: 12px; color: white; margin-top: 8px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    .profile-tags-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .tag-new {
      background: white; color: #880e4f; font-size: 10px; font-weight: 700;
      padding: 6px 14px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* ── CTA BANNER ── */
    .cta-banner {
      width: 90vw; max-width: none; margin: 40px auto 0;
      background: linear-gradient(135deg, #d81b60 0%, #880e4f 100%); border-radius: 20px;
      padding: 40px 48px; display: flex; align-items: center; justify-content: space-between;
      gap: 40px; position: relative; overflow: hidden;
      box-shadow: 0 20px 40px rgba(233,30,140,0.3);
    }
    .cta-left-content {
      display: flex; align-items: center; gap: 40px; position: relative; z-index: 2;
    }
    .cta-img {
      width: 200px; height: 100%; max-height: 250px; object-fit: contain; object-position: bottom;
      border-radius: 50%; border: 4px solid var(--pink); flex-shrink: 0;
    }
    .cta-text h2 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; color: white; }
    .cta-text p { font-size: 17px; color: rgba(255,255,255,0.9); margin-bottom: 16px; }
    .cta-badges-small { display: flex; flex-wrap: wrap; gap: 16px; }
    .cta-badge-sm { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; }
    .cta-badge-sm .icon { color: var(--pink-light); }

    .cta-right-content { text-align: center; position: relative; z-index: 2; }
    .btn-join-white {
      background: white; color: var(--pink); border: none;
      padding: 14px 40px; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    }
    .btn-join-white:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
    .cta-note { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 10px; }
    .cta-arrow-svg { position: absolute; bottom: -5px; left: -50px; width: 40px; opacity: 0.8; }

    /* ── SUCCESS STORIES CAROUSEL ── */
    .stories-section { background: white; }
    .stories-carousel {
      overflow: hidden;
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      padding: 20px 0;
    }
    .stories-track {
      display: flex; gap: 20px;
      animation: scrollMarquee 40s linear infinite;
      width: max-content;
    }
    .stories-track:hover { animation-play-state: paused; }
    .story-card {
      background: white; border-radius: 16px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transition: all 0.4s; width: 400px; flex-shrink: 0;
      display: flex; overflow: hidden; border: 1.5px solid rgba(233,30,140,0.25);
    }
    .story-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(233,30,140,0.15); border-color: rgba(233,30,140,0.3); }
    .story-img-wrapper { width: 40%; flex-shrink: 0; }
    .story-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .story-content { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .story-text { font-size: 13px; line-height: 1.6; color: #4b5563; margin-bottom: 16px; flex: 1; font-style: italic; }
    .couple-name { font-weight: 700; font-size: 13px; color: var(--dark); margin-bottom: 4px; }
    .couple-loc  { font-size: 11px; color: var(--gray); }

    /* ── WHY CHOOSE ── */
    .why-section { background: white; padding-bottom: 40px; }
    .why-banner {
      background: #fff0f6; border-radius: 20px; padding: 40px;
      margin-top: 16px;
    }
    .why-grid { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .why-item { display: flex; align-items: flex-start; gap: 16px; flex: 1; }
    .why-icon-wrapper {
      width: 80px; height: 80px; border-radius: 50%;
      background: white; border: 2px solid var(--pink-dark);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 8px 20px rgba(233,30,140,0.15);
    }
    .why-icon-wrapper span {
      font-size: 40px !important; color: transparent; text-shadow: 0 0 0 var(--pink-dark);
    }
    .why-item h4 { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .why-item p  { font-size: 11px; color: var(--gray); line-height: 1.4; }

    /* ── FEATURE DETAILS ── */
    .feature-detail-section { padding-top: 40px; }
    .feature-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px; margin-top: 40px;
    }
    .feature-card {
      background: white; border-radius: 20px; padding: 40px;
      box-shadow: 0 10px 30px rgba(233,30,140,0.08);
      border: 1px solid rgba(233,30,140,0.05);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .feature-card:hover {
      transform: translateY(-5px); box-shadow: 0 15px 40px rgba(233,30,140,0.15);
    }
    .feature-icon-large {
      width: 80px; height: 80px; border-radius: 50%;
      background: white; border: 2px solid var(--pink-dark);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 8px 20px rgba(233,30,140,0.15);
      margin-bottom: 24px;
    }
    .feature-icon-large span {
      font-size: 40px !important; color: transparent; text-shadow: 0 0 0 var(--pink-dark);
    }
    .feature-text-box h3 {
      font-family: 'Playfair Display', serif; font-size: 36px;
      font-weight: 700; color: var(--dark); margin-bottom: 16px;
    }
    .feature-text-box p {
      font-size: 16px; line-height: 1.8; color: var(--gray);
      margin-bottom: 24px;
    }
    .feature-list { list-style: none; }
    .feature-list li {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; font-size: 15px; font-weight: 500; color: var(--dark);
    }
    .feature-list li .icon { color: var(--pink); font-size: 18px; font-weight: bold; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      z-index: 2000; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; animation: fadeIn 0.3s forwards;
    }
    .modal-box {
      background: white; border-radius: 20px; width: 100%; max-width: 500px;
      position: relative; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      transform: scale(0.9); animation: scaleIn 0.3s forwards;
    }
    .modal-close {
      position: absolute; top: 20px; right: 20px; background: rgba(233,30,140,0.9);
      border: none; width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: white; transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(233,30,140,0.4);
      z-index: 10;
    }
    .modal-close:hover { background: var(--pink); transform: scale(1.1); }

    /* FOOTER CTA */
    .footer-cta-box {
      border-radius: 24px; overflow: hidden; position: relative;
      display: flex; align-items: center; justify-content: space-between;
      padding: 40px 60px; box-shadow: 0 20px 40px rgba(136,14,79,0.3);
      background: linear-gradient(135deg, #d81b60 0%, #880e4f 100%);
    }
    .footer-cta-content {
      position: relative; z-index: 2; display: flex; align-items: center; gap: 30px;
    }
    .footer-cta-img {
      width: 140px; height: 140px; border-radius: 50%; object-fit: cover;
      border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.3); flex-shrink: 0;
    }
    .footer-cta-text { color: white; flex: 1; margin-right: 40px; }
    .footer-cta-text h2 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .footer-cta-text p { font-size: 15px; color: rgba(255,255,255,0.9); }
    .footer-cta-btn-wrapper { position: relative; z-index: 2; text-align: center; flex-shrink: 0; }

    /* ── FOOTER ── */
    .footer {
      background: linear-gradient(135deg, #c0166f 0%, #e91e8c 40%, #a00055 100%);
      color: rgba(255,255,255,0.85);
      padding: 70px 48px 28px;
      position: relative; overflow: hidden;
    }
    .footer-grid {
      width: 100%; max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 2fr 1fr 1fr 2fr;
      gap: 40px; padding-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .crystal-heart {
      position: absolute; color: var(--pink-light);
      pointer-events: none; z-index: 0;
      animation: crystalFall linear infinite;
    }
    .footer-logo { color: white; position: relative; z-index: 2; }
    .footer-logo .logo-text { font-size: 20px; }
    .footer-about { font-size: 13px; line-height: 1.7; margin-top: 12px; }
    .social-links { display: flex; gap: 10px; margin-top: 20px; }
    .social-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: white; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .social-btn:hover { background: var(--pink); transform: translateY(-2px); }
    .footer-col h5 { font-weight: 700; color: white; font-size: 15px; margin-bottom: 16px; }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 10px; }
    .footer-col a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; transition: color 0.3s; }
    .footer-col a:hover { color: white; }
    .footer-contact { display: flex; flex-direction: column; gap: 10px; }
    .contact-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,0.8); }
    .subscribe-row { display: flex; gap: 0; margin-top: 16px; }
    .subscribe-row input {
      flex: 1; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.15); color: white; border-radius: 8px 0 0 8px;
      font-size: 13px; outline: none;
    }
    .subscribe-row input::placeholder { color: rgba(255,255,255,0.6); }
    .btn-subscribe {
      background: var(--pink); color: white; border: none;
      padding: 10px 16px; border-radius: 0 8px 8px 0;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.3s;
    }
    .btn-subscribe:hover { background: var(--pink-dark); }
    .footer-bottom {
      width: 100%; max-width: 1200px; padding: 0; margin: 24px auto 0;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: rgba(255,255,255,0.6);
    }
    .footer-bottom a { color: rgba(255,255,255,0.7); text-decoration: none; margin-left: 20px; }
    .footer-bottom a:hover { color: white; }

    /* ── SCROLL INDICATOR ── */
    .scroll-progress {
      position: fixed; top: 0; left: 0; height: 3px;
      background: linear-gradient(to right, var(--pink), var(--purple));
      z-index: 9999; transition: width 0.1s;
    }

    /* ── NEW SECTIONS CSS ── */
    /* Global Reach (Flags) */
    .global-reach-section { padding: 60px 48px 40px; text-align: center; background: white; }
    .global-reach-title { font-size: 28px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .global-reach-sub { color: var(--gray); font-size: 15px; margin-bottom: 30px; }
    .flags-row { display: flex; justify-content: center; align-items: center; gap: 30px; flex-wrap: wrap; }
    .flag-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .flag-circle { width: 60px; height: 60px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; background: #f9f9f9; }
    .flag-item span { font-size: 13px; font-weight: 600; color: var(--dark); }

    /* Operations Centers */
    .ops-centers-section { padding: 40px 48px 80px; background: white; }
    .ops-title { font-size: 28px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .ops-sub { color: var(--gray); font-size: 15px; margin-bottom: 30px; }
    .ops-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
    .ops-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.3s; }
    .ops-card:hover { transform: translateY(-5px); }
    .ops-img { width: 100%; height: 140px; object-fit: cover; }
    .ops-info { padding: 16px; }
    .ops-country { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
    .ops-country::before { content: '📍'; font-size: 12px; color: var(--pink); }
    .ops-city { font-size: 13px; color: var(--gray); display: flex; align-items: center; gap: 6px; }
    .ops-city::before { content: '📍'; font-size: 10px; color: var(--pink); opacity: 0.6; }

    /* About Love Connect */
    .about-section { padding: 80px 48px; background: white; position: relative; overflow: hidden; }
    .about-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .about-badge { display: inline-flex; align-items: center; gap: 8px; color: var(--pink); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; background: rgba(233,30,140,0.1); padding: 6px 16px; border-radius: 20px; margin-bottom: 24px; }
    .about-title { font-family: 'Playfair Display', serif; font-size: 42px; line-height: 1.2; font-weight: 700; color: var(--dark); margin-bottom: 20px; }
    .about-desc { font-size: 16px; color: var(--gray); line-height: 1.6; margin-bottom: 40px; }
    .about-features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .about-feature { display: flex; flex-direction: column; gap: 8px; }
    .about-feature-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(233,30,140,0.05); color: var(--pink); display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(233,30,140,0.1); }
    .about-feature h4 { font-size: 15px; font-weight: 700; color: var(--dark); }
    .about-feature p { font-size: 13px; color: var(--gray); line-height: 1.4; }
    .about-map-container { position: relative; width: 100%; aspect-ratio: 1; background: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=800&q=80') center/contain no-repeat; opacity: 0.8; mix-blend-mode: multiply; filter: hue-rotate(300deg) saturate(2); }
    .map-overlay-card { position: absolute; right: -20px; top: 50%; transform: translateY(-50%); background: white; padding: 20px; border-radius: 16px; box-shadow: 0 15px 35px rgba(233,30,140,0.15); text-align: center; }
    .map-overlay-card h4 { font-size: 14px; color: var(--gray); font-weight: 600; margin-bottom: 4px; }
    .map-overlay-card .big-num { font-size: 32px; font-weight: 700; color: var(--pink); line-height: 1; }
    .map-overlay-card .heart-icon { position: absolute; right: -10px; bottom: -10px; width: 30px; height: 30px; background: var(--pink); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 4px 10px rgba(233,30,140,0.4); }

    /* Stats Banner Pink */
    .stats-banner-pink { background: #fff0f5; padding: 40px 0; border-top: 1px solid rgba(233,30,140,0.1); border-bottom: 1px solid rgba(233,30,140,0.1); }
    .sb-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 30px; padding: 0 20px; }
    .sb-item { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; position: relative; }
    .sb-item:not(:last-child)::after { content: ''; position: absolute; right: -40px; top: 10%; bottom: 10%; width: 1px; background: rgba(233,30,140,0.2); }
    .sb-icon { font-size: 28px; color: var(--pink); margin-bottom: 4px; }
    .sb-num { font-size: 28px; font-weight: 700; color: var(--pink); line-height: 1; }
    .sb-label { font-size: 13px; font-weight: 600; color: var(--dark); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Journey Timeline */
    .journey-section { padding: 80px 48px; background: white; }
    .journey-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 400px; gap: 60px; align-items: center; }
    .journey-title { font-size: 22px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .journey-subtitle { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--pink); font-weight: 700; line-height: 1.2; margin-bottom: 20px; }
    .journey-desc { font-size: 16px; color: var(--gray); line-height: 1.6; margin-bottom: 50px; max-width: 500px; }
    
    .timeline { display: flex; justify-content: space-between; position: relative; margin-top: 40px; }
    .timeline::before { content: ''; position: absolute; left: 20px; right: 20px; top: 20px; height: 2px; background: rgba(233,30,140,0.2); z-index: 1; }
    .timeline-item { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; width: 100px; gap: 12px; }
    .tl-icon { width: 40px; height: 40px; border-radius: 50%; background: white; border: 2px solid var(--pink); color: var(--pink); display: flex; align-items: center; justify-content: center; font-size: 18px; background: #fff0f5; box-shadow: 0 0 0 4px white; }
    .tl-year { font-size: 14px; font-weight: 700; color: rgba(233,30,140,0.5); }
    .tl-title { font-size: 13px; font-weight: 700; color: var(--dark); line-height: 1.2; margin-bottom: 4px; }
    .tl-desc { font-size: 11px; color: var(--gray); line-height: 1.4; }
    
    .journey-img-box { position: relative; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    .journey-img { width: 100%; height: 400px; object-fit: cover; display: block; }
    .journey-quote-card { position: absolute; bottom: 20px; left: 20px; right: 20px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; gap: 16px; align-items: flex-start; }
    .journey-quote-card .quote-mark { font-family: 'Playfair Display', serif; font-size: 60px; color: var(--pink); line-height: 0.6; height: 30px; }
    .journey-quote-card p { font-size: 14px; color: var(--dark); font-weight: 500; line-height: 1.5; margin: 0; }

    /* Trust Banner Dark Pink */
    .trust-banner-dark { background: linear-gradient(90deg, #c0166f 0%, #e91e8c 100%); margin: 0 48px 80px; border-radius: 24px; padding: 40px; color: white; box-shadow: 0 20px 40px rgba(233,30,140,0.3); }
    .tbd-title { text-align: center; font-size: 18px; font-weight: 600; letter-spacing: 1px; margin-bottom: 30px; position: relative; }
    .tbd-title::before, .tbd-title::after { content: ''; display: inline-block; width: 60px; height: 1px; background: rgba(255,255,255,0.3); vertical-align: middle; margin: 0 16px; }
    .tbd-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; align-items: center; }
    .tbd-item { display: flex; align-items: center; gap: 12px; }
    .tbd-icon { width: 48px; height: 48px; border-radius: 50%; background: white; color: var(--pink); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .tbd-item h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .tbd-item p { font-size: 11px; opacity: 0.8; line-height: 1.3; }
    .tbd-center { text-align: center; flex-direction: column; gap: 8px; }
    .tbd-center .big-rating { font-size: 32px; font-weight: 700; line-height: 1; }
    .tbd-center .stars { color: #ffd700; font-size: 16px; letter-spacing: 2px; }

    /* Responsive */
    @media (max-width: 1024px) {
      .stats-bar-wrapper, .section-max, .cta-banner, .footer-grid, .footer-bottom { width: 100%; padding-left: 20px; padding-right: 20px; }
      .why-banner { padding: 30px; }
      .profiles-grid.permanent-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      /* Fix horizontal scroll — clamp all sections */
      .footer { padding: 60px 20px 20px; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 24px; }
      .global-reach-section, .ops-centers-section, .about-section, .journey-section { padding-left: 16px; padding-right: 16px; }
      .trust-banner-dark { margin: 0 0 60px; border-radius: 0; }
      .tbd-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .about-container { grid-template-columns: 1fr; gap: 30px; }
      .journey-container { grid-template-columns: 1fr; gap: 30px; }
      .navbar { position: fixed !important; background: transparent !important; backdrop-filter: none !important; padding: 14px 20px; }
      .navbar.scrolled { background: transparent !important; backdrop-filter: none !important; position: fixed !important; }
      .hamburger-btn {
        display: flex !important;
        flex-direction: column; gap: 5px;
        background: transparent; border: 1px solid rgba(255,255,255,0.3);
        padding: 8px 10px; border-radius: 8px; cursor: pointer;
      }
      .hamburger-btn span {
        display: block; width: 20px; height: 2px;
        background: white; border-radius: 2px; transition: all 0.3s;
      }
      .mobile-menu {
        display: none !important;
        position: absolute; top: calc(100% + 10px); right: 20px; left: auto;
        width: 220px;
        background: rgba(10,0,15,0.97); backdrop-filter: blur(10px);
        flex-direction: column; gap: 0;
        border: 1px solid rgba(233,30,140,0.3);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        z-index: 999;
        animation: fadeIn 0.2s ease;
      }
      .mobile-menu.open { display: flex !important; }
      .mobile-menu a {
        display: block; padding: 14px 20px;
        color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 500;
        text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: color 0.2s, background 0.2s;
      }
      .mobile-menu a:last-child { border-bottom: none; }
      .mobile-menu a:hover { color: var(--pink); background: rgba(233,30,140,0.05); }

      .stats-bar-wrapper { width: 100%; margin-top: -30px; padding-left: 16px; padding-right: 16px; }
      .section-max, .cta-banner, .footer-grid, .footer-bottom { width: 100%; padding-left: 16px; padding-right: 16px; }
      .hero-content { align-items: flex-start; text-align: left; padding-left: 10px; }
      .profiles-grid.permanent-grid { grid-template-columns: repeat(2, 1fr); }
      .story-card { flex-direction: column; width: 300px; }
      .story-img-wrapper { width: 100%; height: 200px; }
      .why-grid { flex-direction: column; align-items: stretch; }
      .why-item { justify-content: flex-start; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .nav-links { display: none; }
      .section { padding: 60px 20px; }
      .hero-left h1 { font-size: 42px; margin-bottom: 16px; }
      .hero-bg { opacity: 0.6; mask-image: none; -webkit-mask-image: none; background-position: right center; }
      
      .stats-inner { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; }
      .stats-inner::-webkit-scrollbar { display: none; }
      .stat-item { min-width: 140px; }
      .stat-item:not(:last-child)::after { right: 0; bottom: 10%; top: 10%; width: 1px; height: auto; left: auto; }
      .stat-icon-wrapper { margin: 0 auto; width: 40px; height: 40px; font-size: 20px; }
      .stat-num { font-size: 13px; }
      .stat-label { font-size: 10px; }
      
      .cta-banner { flex-direction: column; text-align: center; padding: 30px 20px; gap: 24px; height: auto; }
      .cta-left-content { flex-direction: column; text-align: center; }
      .cta-img { margin: 0 auto; width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
      .cta-badges-small { justify-content: center; }
      .cta-arrow-svg { display: none; }

      .footer-cta-box { flex-direction: column; padding: 40px 20px; text-align: center; height: auto; }
      .footer-cta-content { flex-direction: column; }
      .footer-cta-img { margin-right: 0; margin-bottom: 24px; width: 160px; height: 160px; border-radius: 50%; object-fit: cover; }
      .footer-cta-text { margin-right: 0; margin-bottom: 24px; }
      .profiles-grid.permanent-grid { grid-template-columns: repeat(2, 1fr); }

      .profiles-header { flex-direction: column; gap: 16px; }
      .btn-view-all { position: static !important; }

      /* Responsive Profile Modal — compact scrollable */
      .profile-modal-box { width: 96% !important; max-width: 560px !important; max-height: 90vh !important; height: auto !important; border-radius: 20px !important; margin: 20px auto !important; overflow-y: auto !important; }
      .modal-overlay { padding: 20px 0 !important; align-items: flex-start !important; }
      .profile-modal-content { padding: 20px !important; gap: 20px !important; flex-direction: column !important; }
      .profile-modal-left { flex: none !important; width: 100% !important; }
      .profile-img-container { height: auto !important; aspect-ratio: 4/3 !important; border-radius: 14px !important; overflow: hidden; }
      .profile-img-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .profile-modal-right { flex: none !important; width: 100% !important; padding-top: 0 !important; }
      .profile-trust-strip { padding: 20px !important; gap: 14px !important; grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 600px) {
      .footer-grid { grid-template-columns: 1fr; gap: 24px; }
      .footer { padding: 50px 16px 20px; }
      .trust-banner-dark { margin: 0; border-radius: 0; padding: 24px 16px; }
      .tbd-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .tbd-center { grid-column: span 2; }
      .ops-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .about-features-grid { grid-template-columns: 1fr 1fr; }
      .sb-item:not(:last-child)::after { display: none; }
      .sb-container { flex-wrap: wrap; justify-content: center; }
      .stats-bar-wrapper { margin-top: 32px; }
      .btn-login { padding: 7px 14px; font-size: 12px; gap: 5px; border-radius: 20px; }
      .btn-login .icon { font-size: 13px; }
      .profiles-grid.permanent-grid { grid-template-columns: repeat(1, 1fr) !important; gap: 16px; }
      
      .desktop-only { display: none !important; }

    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.invisible');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              observer.unobserve(e.target);
            }
          });
        }, { threshold: 0.12 });
        els.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      });
    }

    /* ─── Scroll Progress Hook ─── */
    function useScrollProgress() {
      const [progress, setProgress] = useState(0);
      useEffect(() => {
        const handler = () => {
          const scrolled = window.scrollY;
          const total = document.documentElement.scrollHeight - window.innerHeight;
          setProgress(total > 0 ? (scrolled / total) * 100 : 0);
        };
        window.addEventListener('scroll', handler);
        return () => window.removeEventListener('scroll', handler);
      }, []);
      return progress;
    }

      const [step, setStep] = useState(0);
      const steps = ['Finding your perfect match...', 'Preparing the experience...', 'Welcome to LoveConnect'];

      useEffect(() => {
        let t;
        if (step < steps.length - 1) {
          t = setTimeout(() => setStep(s => s + 1), 1200);
        } else {
          t = setTimeout(onDone, 1200);
        }
        return () => clearTimeout(t);
      }, [step]);

      return (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 99999,
          background: 'var(--white)',

    /* ─── APP ─── */
    function App() {
      const progress = useScrollProgress();
      const [splashDone, setSplashDone] = useState(false);
      useReveal();
      const [isLoginOpen, setIsLoginOpen] = useState(false);
      const [isUserBoxOpen, setIsUserBoxOpen] = useState(false);
      const [selectedProfile, setSelectedProfile] = useState(null);
      const [loggedInUser, setLoggedInUser] = useState(null);

      const [appProfiles, setAppProfiles] = useState(profiles);
      const [appStories, setAppStories] = useState(stories);
      const [globalData, setGlobalData] = useState(null);

      useEffect(() => {
        db.collection('website_content').doc('global').get().then(doc => {
          if (doc.exists) setGlobalData(doc.data());
        });

        db.collection('profiles').onSnapshot(snap => {
          if (!snap.empty) {
            const p = [];
            snap.forEach(doc => {
              const d = doc.data();
              if (d && d.name && d.img) p.push(d);
            });
            if (p.length > 0) { p.reverse(); setAppProfiles(p); }
          }
        }, err => console.error('Profiles fetch error:', err));

        db.collection('testimonials').onSnapshot(snap => {
          if (!snap.empty) {
            const s = [];
            snap.forEach(doc => {
              const d = doc.data();
              if (d && d.names && d.text) s.push(d);
            });
            if (s.length > 0) setAppStories(s);
          }
        }, err => console.error('Testimonials fetch error:', err));
      }, []);

      return (
        <>
          {!splashDone && <MainSplash onDone={() => setSplashDone(true)} />}
          <div className="scroll-progress" style={{ width: `${progress}%` }} />
          <Navbar onLoginClick={() => setIsLoginOpen(true)} loggedInUser={loggedInUser} onUserClick={() => setIsUserBoxOpen(true)} />
          <Hero g={globalData} />
          <StatsBar g={globalData} />
          <ProfilesSection onSelectProfile={setSelectedProfile} profilesData={appProfiles} />
          <WhySection g={globalData} />
          <GlobalReachSection g={globalData} />
          <OperationsSection />
          <AboutSection g={globalData} />
          <StatsBannerPink g={globalData} />
          <JourneySection g={globalData} />
          <TrustBannerDark g={globalData} />
          <StoriesSection storiesData={appStories} />
          <Footer />
          <LoginModal isOpen={isLoginOpen} onClose={() => setIsLoginOpen(false)} setLoggedInUser={setLoggedInUser} />
          <ProfileModal profile={selectedProfile} onClose={() => setSelectedProfile(null)} />
          <UserProfileModal isOpen={isUserBoxOpen} user={loggedInUser} onClose={() => setIsUserBoxOpen(false)} />
        </>
      );
    }

    function Navbar({ onLoginClick, loggedInUser, onUserClick }) {
      const [scrolled, setScrolled] = useState(false);
      const [heartClicks, setHeartClicks] = useState(0);
      const [menuOpen, setMenuOpen] = useState(false);

      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 30);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);

      const handleHeartClick = (e) => {
        e.preventDefault();
        setHeartClicks(prev => {
          const newClicks = prev + 1;
          if (newClicks >= 12) {
            const pwd = prompt("Admin Panel Password:");
            if (pwd === "123") {
              window.open("admin.html", "_blank");
            } else if (pwd) {
              alert("Incorrect password!");
            }
            return 0;
          }
          return newClicks;
        });
      };

      const navItems = [
        { label: 'Home', id: 'section-hero' },
        { label: 'Featured Profiles', id: 'section-profiles' },
        { label: 'Looking for Someone', id: 'section-cta' },
        { label: 'Success Stories', id: 'section-stories' },
        { label: 'Why Choose Us', id: 'section-why' },
      ];

      const scrollToSection = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        setMenuOpen(false);
      };

      return (
        <nav className={`navbar ${scrolled ? 'scrolled' : ''}`}>
          <a className="logo" href="#">
            <span className="logo-icon" onClick={handleHeartClick} style={{cursor: 'pointer'}}>💗</span>

              <div className="logo-text">LoveConnect</div>
              <div className="logo-sub">Find Love. Build Forever.</div>
            </div>
          </a>
          <ul className="nav-links">
            {navItems.map((item, i) => (
              <li key={i}><a href="#" className={i === 0 ? 'active' : ''} onClick={(e) => { e.preventDefault(); scrollToSection(item.id); }}>{item.label}</a></li>
            ))}
          </ul>
          <div style={{ display: 'flex', gap: '10px', alignItems: 'center' }}>
            {loggedInUser?.isAdmin && (
              <button className="btn-login desktop-only" style={{ background: 'var(--dark)', color: 'white' }} onClick={() => window.open('admin.html', '_blank')}>🛠️ Admin Panel</button>
            )}
            {loggedInUser ? (
              <button className="btn-login" onClick={(e) => { e.preventDefault(); onUserClick(); }}><span className="icon">👤</span> {loggedInUser.name}</button>
            ) : (
              <button className="btn-login" onClick={(e) => { e.preventDefault(); onLoginClick(); }}><span className="icon">👤</span> Login</button>
            )}

              <span></span>
              <span></span>
              <span></span>

          </div>

          {/* Mobile Dropdown Menu */}
          <div className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
            {navItems.map((item, i) => (
              <a key={i} href="#" onClick={(e) => { e.preventDefault(); scrollToSection(item.id); }}>{item.label}</a>
            ))}
            {loggedInUser?.isAdmin && (
              <a href="#" onClick={(e) => { e.preventDefault(); window.open('admin.html', '_blank'); setMenuOpen(false); }}>🛠️ Admin Panel</a>
            )}
          </div>
        </nav>
      );
    }

    /* ─── HERO ─── */
    function Hero({ g }) {
      const bgImg = g?.heroImg || '';
      return (
        <section className="hero" id="section-hero">
          <div className="hero-bg" style={bgImg ? { backgroundImage: `url(${bgImg})` } : {}} />
          <div className="hero-hearts">
            {hearts.map((h, i) => (
              <span key={i} className="floating-heart" style={{
                left: `${10 + i * 12}%`,
                top: `${10 + (i % 3) * 30}%`,
                animationDelay: `${i * 0.4}s`,
                fontSize: `${20 + (i % 3) * 12}px`,
                color: i % 2 === 0 ? '#ff6eb4' : '#e91e8c'
              }}>♥</span>
            ))}
          </div>
          <div className="hero-content">
            <div className="hero-left">
              <div className="trusted-badge"><span style={{color:'var(--pink)', fontSize: 14}}>♥</span> Trusted by Thousands</div>
              <h1>Find Genuine <br/><span style={{color: 'var(--pink)'}}>Connections</span> <br/>That Last a <br/>Lifetime</h1>
              <p style={{ maxWidth: 400, marginTop: 16 }}>{g?.heroSubtitle || 'Join thousands of real people who are looking for meaningful relationships and a better tomorrow.'}</p>
              
              <button className="btn-join-today" style={{ marginTop: 24 }}><span className="icon">👤</span> Join Us Today</button>
              
              <div className="face-pile" style={{ marginTop: 20 }}>
                <div className="faces">
                  <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=100" alt="user" />
                  <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100" alt="user" />
                  <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100" alt="user" />
                </div>
                <div className="face-pile-text">
                  <strong>10K+ people</strong><br/>already joined
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── STATS ─── */
    function StatsBar() {
      const stats = [
        { icon: '🛡️', title: '100% Verified Profiles', desc: 'Safe & authentic connections' },
        { icon: '🔒', title: 'Privacy Protected', desc: 'Your data is always secure' },
        { icon: '👥', title: 'Real People Real Stories', desc: 'Genuine profiles you can trust' },
        { icon: '⭐', title: 'Safe & Secure Platform', desc: 'Your safety is our priority' }
      ];
      return (
        <div className="stats-bar-wrapper invisible from-scale">
          <div className="stats-bar">
            <div className="stats-inner">
              {stats.map((s, i) => (
                <div key={i} className="stat-item invisible" style={{ transitionDelay: `${i * 0.1}s` }}>
                  <div className="stat-icon-wrapper" dangerouslySetInnerHTML={{__html: s.icon === '🛡️' ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>' : s.icon === '🔒' ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>' : s.icon === '👥' ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>' : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>'}} />
                  <div>
                    <div className="stat-num">{s.title}</div>
                    <div className="stat-label">{s.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ─── PROFILES ─── */
    function ProfilesSection({ onSelectProfile, profilesData }) {
      const [visibleCount, setVisibleCount] = useState(6);
      const totalProfiles = profilesData.length;
      const shownProfiles = profilesData.slice(0, visibleCount);
      const hasMore = visibleCount < totalProfiles;
      const handleLoadMore = () => setVisibleCount(prev => prev + 6);
      return (
        <section className="section profiles-section" id="section-profiles" style={{ background: 'white' }}>
          <div className="section-max">
            <div className="eyebrow invisible" style={{ marginBottom: 4 }}>DISCOVER AMAZING PEOPLE</div>
            <div className="profiles-top-center invisible" style={{ transitionDelay: '0.1s', textAlign: 'center', marginBottom: 40 }}>
              <h2 className="section-title" style={{ marginBottom: 12 }}>Featured <span style={{color: 'var(--pink)'}}>Female</span><br/>Profiles</h2>
              <div className="heart-divider" style={{ justifyContent: 'center' }}><span className="heart-divider-icon">♥</span></div>
              <p style={{ color: 'var(--gray)', fontSize: 16, maxWidth: 500, margin: '20px auto', lineHeight: 1.6 }}>Meet genuine, kind-hearted women looking for meaningful relationships.</p>
            </div>
            
            <div className="profiles-subheader invisible" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
              <h3 style={{ fontSize: 24, fontFamily: 'Playfair Display', fontWeight: 700, color: 'var(--dark)' }}>Featured Female Profiles</h3>
            </div>
            
            <div className="profiles-grid permanent-grid invisible">
              {shownProfiles.map((p, i) => (
                <div key={i} className="profile-card new-style" style={{ cursor: 'pointer' }} onClick={() => onSelectProfile(p)}>
                  <span className="online-dot"></span>
                  <button className="heart-btn-circle" onClick={(e) => { e.stopPropagation(); /* handle favorite */ }}>♥</button>
                  <img src={p.img} alt={p.name} className="profile-img" />
                  <div className="profile-overlay-new">
                    <div className="profile-name-new">
                      {p.name}, {p.age} <span className="verified-badge">✓</span>
                    </div>
                    <div className="profile-profession">{p.job || 'Marketing Executive'}</div>
                    <div className="profile-loc-new">
                      <span className="loc-pin">📍</span> {p.city}, {p.state}
                    </div>
                    <div className="profile-tags-row">
                      {p.tags && p.tags.slice(0, 3).map((t, j) => <span key={j} className="tag-new">{t}</span>)}
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {hasMore && (
              <div className="load-more-wrapper invisible" style={{ textAlign: 'center', marginTop: 40 }}>
                <button className="btn-outline-pink wide" style={{ color: '#e91e8c', borderColor: '#e91e8c', cursor: 'pointer' }} onClick={handleLoadMore}>
                  <span style={{fontSize:18, marginRight: 8}}>↻</span> Load More Profiles
                </button>
              </div>
            )}
          </div>
        </section>
      );
    }

    /* ─── CTA BANNER ─── */
    function CtaBanner({ g }) {
      return (
        <div className="cta-banner invisible from-scale" id="section-cta">
          <div className="cta-left-content">
            <img src={g?.cta1Img || "./looking.png"} alt="Looking" className="cta-img" />
            <div className="cta-text">
              <h2>{g?.cta1Title || 'Looking For Someone Special?'}</h2>
              <p>{g?.cta1Desc || 'Join our community and find your perfect match today!'}</p>
              <div className="cta-badges-small">
                {['✅ Easy Registration','✅ 100% Free','💗 Verified Profiles','🔒 Secure & Private'].map((b, i) => (
                  <span key={i} className="cta-badge-sm">{b}</span>
                ))}
              </div>
            </div>
          </div>
          <div className="cta-right-content">
            <button className="btn-join-white"><span className="icon" style={{color: '#e91e8c'}}>👥</span> Join Us</button>
            <div className="cta-note">It only takes a minute!</div>
            <svg className="cta-arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M90 10C80 40 50 60 10 90 M10 90 L30 85 M10 90 L20 70" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        </div>
      );
    }

    /* ─── STORIES ─── */
    function StoriesSection({ storiesData }) {
      return (
        <section className="section stories-section" id="section-stories">
          <div className="section-max">
            <div className="eyebrow invisible" style={{ marginBottom: 4 }}>SUCCESS STORIES</div>
            <div className="profiles-header invisible" style={{ transitionDelay: '0.1s', position: 'relative' }}>
              <div style={{ width: '100%', textAlign: 'center' }}>
                <h2 className="section-title" style={{ marginBottom: 12 }}>Real People, Real Love</h2>
                <div className="heart-divider"><span className="heart-divider-icon">♥</span></div>
              </div>
            </div>
            
            <div className="stories-carousel">
              <div className="stories-track">
                {[...storiesData, ...storiesData].map((s, i) => (
                  <div key={i} className="story-card">
                    <div className="story-img-wrapper">
                      <img src={s.img} alt={s.names} className="story-img" />
                    </div>
                    <div className="story-content">
                      <div className="stars">
                        {'★'.repeat(5).split('').map((star,j) => <span key={j} style={{color:'#e91e8c', fontSize: 16, marginRight: 2}}>{star}</span>)}
                      </div>
                      <div className="story-text">"{s.text}"</div>
                      <div className="couple-name">– {s.names}</div>
                      <div className="couple-loc">{s.city}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── WHY CHOOSE ─── */
    function WhySection({ g }) {
      return (
        <section className="section why-section" id="section-why">
          <div className="section-max">
            <div className="eyebrow invisible" style={{ marginBottom: 4 }}>{g?.whyEyebrow || 'WHY CHOOSE LOVE CONNECT?'}</div>
            <div className="why-banner invisible from-scale">
              <div className="why-grid">
                {whyChoose.map((w, i) => (
                  <div key={i} className="why-item">
                    <div className="why-icon-wrapper">
                       <span>{w.icon}</span>
                    </div>
                    <div>
                      <h4>{w.title}</h4>
                      <p>{w.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </section>
      );
    }

    /* ─── FOOTER CTA ─── */
    function FooterCta({ g }) {
      return (
        <div className="section-max invisible from-scale" style={{ padding: '0 48px', position: 'relative', top: '40px', zIndex: 10 }}>
          <div className="footer-cta-box">
            <div className="footer-cta-content">
              <img src={g?.cta2Img || "./couple.png"} alt="Couple" className="footer-cta-img" />
              <div className="footer-cta-text">
                <h2>{g?.cta2Title || 'Ready To Start Your Journey?'}</h2>
                <p>{g?.cta2Desc || 'Join thousands of happy members and find someone special today!'}</p>
              </div>
            </div>
            <div className="footer-cta-btn-wrapper">
              <button className="btn-join-white" style={{ margin: '0 auto' }}><span className="icon" style={{color: '#e91e8c'}}>👥</span> Join Us</button>
              <div style={{ color: 'rgba(255,255,255,0.8)', fontSize: 12, marginTop: 8 }}>It only takes a minute!</div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── FOOTER ─── */
    function Footer() {
      // Generate some crystal hearts
      const crystalHearts = Array.from({ length: 20 }).map((_, i) => ({
        id: i,
        left: `${Math.random() * 100}%`,
        delay: `${Math.random() * 15}s`,
        duration: `${15 + Math.random() * 20}s`,
        size: `${12 + Math.random() * 16}px`
      }));

      return (
        <footer className="footer">
          {crystalHearts.map(h => (
            <span key={h.id} className="crystal-heart" style={{
              left: h.left,
              animationDelay: h.delay,
              animationDuration: h.duration,
              fontSize: h.size
            }}>✦</span>
          ))}
          <div className="footer-grid">
            <div className="footer-logo">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 22 }}>💗</span>
                <div>
                  <div className="logo-text" style={{ color: '#e91e8c' }}>LoveConnect</div>
                  <div className="logo-sub">Find Love. Build Forever.</div>
                </div>
              </div>
              <p className="footer-about">LoveConnect is a trusted platform where real people come together to build meaningful relationships that last a lifetime.</p>
              <div className="social-links">
                {['f','📷','🐦','▶'].map((s, i) => <button key={i} className="social-btn">{s}</button>)}
              </div>
            </div>
            <div className="footer-col">
              <h5>Quick Links</h5>
              <ul>
                {['About Us','How It Works','Success Stories','Blog','Contact Us'].map((l, i) => (
                  <li key={i}><a href="#">{l}</a></li>
                ))}
              </ul>
            </div>
            <div className="footer-col">
              <h5>Contact Us</h5>
              <div className="footer-contact">
                <div className="contact-item">📞 +91 98765 43210</div>
                <div className="contact-item">✉️ support@loveconnect.com</div>
                <div className="contact-item">📍 Kolkata, West Bengal, India</div>
                <div className="contact-item">🕒 Mon–Sun: 9AM–9PM</div>
              </div>
            </div>
            <div className="footer-col">
              <h5>Subscribe To Our Newsletter</h5>
              <p style={{ fontSize: 13, marginBottom: 12 }}>Get updates about new members and special offers straight to your inbox.</p>
              <div className="subscribe-row">
                <input type="email" placeholder="Enter your email" />
                <button className="btn-subscribe">Subscribe</button>
              </div>
            </div>
          </div>
          <div className="footer-bottom">
            <span>© 2024 LoveConnect. All Rights Reserved.</span>
          </div>
        </footer>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
