<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoveConnect – Find Love. Build Forever.</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #e91e8c;
      --pink-dark: #c0166f;
      --pink-light: #ff6eb4;
      --purple: #6a0572;
      --purple-dark: #3d0040;
      --cream: #fff5f9;
      --dark: #1a0020;
      --gray: #6b7280;
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(50px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-12px); }
    }
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      25%       { transform: scale(1.15); }
      50%       { transform: scale(1); }
      75%       { transform: scale(1.1); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scrollMarquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-50%)); }
    }
    @keyframes crystalFall {
      0% { transform: translateY(-50px) rotate(0deg) scale(0.8); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(600px) rotate(360deg) scale(1.2); opacity: 0; }
    }

    .animate-in     { animation: fadeInUp 0.7s ease forwards; }
    .animate-left   { animation: fadeInLeft 0.7s ease forwards; }
    .animate-right  { animation: fadeInRight 0.7s ease forwards; }
    .animate-scale  { animation: scaleIn 0.6s ease forwards; }
    .animate-fade   { animation: fadeIn 0.8s ease forwards; }

    /* Main Splash Animations */
    @keyframes heartPump {
      0%, 100% { transform: scale(1); }
      14% { transform: scale(1.3); }
      28% { transform: scale(1); }
      42% { transform: scale(1.2); }
      70% { transform: scale(1); }
    }
    @keyframes connectFade {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes splashOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.05); }
    }

    .visible   { opacity: 1 !important; transform: translate(0, 0) scale(1) !important; }
    .invisible { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .invisible.from-left  { transform: translateX(-50px); }
    .invisible.from-right { transform: translateX(50px); }
    .invisible.from-scale { transform: scale(0.85); }

    /* ── NAVBAR ── */
    .navbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 48px;
      background: transparent;
      border-bottom: none;
      box-shadow: none;
      transition: background 0.3s, backdrop-filter 0.3s;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { font-size: 32px; animation: heartBeat 2s infinite; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: white; }
    .logo-sub  { font-size: 11px; color: rgba(255,255,255,0.8); letter-spacing: 0.5px; }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a {
      text-decoration: none; font-size: 14px; font-weight: 600; color: white;
      position: relative; transition: color 0.3s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--pink); transform: scaleX(0);
      transition: transform 0.3s; transform-origin: left;
    }
    .nav-links a:hover { color: var(--pink-light); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-links a.active { color: white; border-bottom: 2px solid var(--pink); }
    .btn-login {
      display: flex; align-items: center; gap: 8px;
      background: transparent; color: white; border: 1px solid var(--pink);
      padding: 10px 24px; border-radius: 25px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      transition: all 0.3s;
    }
    .btn-login:hover { background: rgba(233,30,140,0.1); }
    .btn-login .icon { color: var(--pink); font-size: 16px; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh; position: relative; overflow: hidden;
      display: flex; align-items: center; padding-top: 80px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    }
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(10,0,15,0.85) 0%, rgba(10,0,15,0.4) 50%, rgba(10,0,15,0.1) 100%);
    }
    .hero-hearts { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .floating-heart {
      position: absolute; font-size: 24px; opacity: 0.8;
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 5px rgba(255, 105, 180, 0.5));
    }
    .hero-content {
      position: relative; z-index: 2;
      display: grid; grid-template-columns: 1.2fr 1fr;
      gap: 60px; align-items: center;
      max-width: 1200px; margin: 0 auto; padding: 60px 48px;
      width: 100%;
    }
    .hero-left { color: white; }
    .hero-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px; line-height: 1.1; font-weight: 700;
      margin-bottom: 24px;
      animation: fadeInLeft 0.8s ease 0.2s both;
    }
    .hero-left h1 span { color: var(--pink-light); }
    .hero-left p {
      font-size: 18px; line-height: 1.6; color: rgba(255,255,255,0.9);
      margin-bottom: 40px; max-width: 480px;
      animation: fadeInLeft 0.8s ease 0.4s both;
    }
    .join-action {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 48px;
      animation: fadeInLeft 0.8s ease 0.6s both;
    }
    .btn-join {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--pink); color: white; border: none;
      padding: 16px 36px; border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 15px rgba(233,30,140,0.4);
      transition: all 0.3s;
    }
    .btn-join:hover { background: var(--pink-dark); transform: translateY(-2px); }
    .arrow-icon {
      height: 40px; opacity: 0.9; width: 100px;
    }
    .hero-badges {
      display: flex; gap: 24px; flex-wrap: wrap;
      animation: fadeInLeft 0.8s ease 0.8s both;
    }
    .badge {
      display: flex; align-items: center; gap: 12px;
      color: white; font-size: 12px; font-weight: 500;
      line-height: 1.3;
    }
    .badge-icon-wrapper {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(233,30,140,0.1); border: 1px solid rgba(233,30,140,0.5);
      display: flex; align-items: center; justify-content: center;
      color: var(--pink-light); font-size: 18px;
    }

    /* JOIN CARD */
    .join-card {
      background: white; border-radius: 16px;
      padding: 36px 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      animation: fadeInRight 0.8s ease 0.3s both;
      position: relative;
      margin-left: auto;
      max-width: 400px;
      width: 100%;
    }
    .card-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; font-size: 20px; color: var(--gray);
      cursor: pointer;
    }
    .join-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 26px; text-align: center; margin-bottom: 8px;
      color: var(--dark); display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .join-card h3 .icon { color: var(--pink); font-size: 20px; }
    .join-sub { text-align: center; color: var(--pink); font-size: 13px; font-weight: 600; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 8px;
    }
    .form-group label .icon { color: var(--pink); font-size: 14px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid #e5e7eb;
      border-radius: 8px; font-size: 14px; outline: none; background: #fafafa;
      transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: var(--pink); background: white; }
    .btn-create {
      width: 100%; padding: 16px; border: none; border-radius: 8px;
      background: var(--pink);
      color: white; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 4px 15px rgba(233,30,140,0.3);
      margin-top: 10px; margin-bottom: 20px;
    }
    .btn-create:hover { background: var(--pink-dark); transform: translateY(-2px); }
    .secure-note { text-align: center; font-size: 13px; font-weight: 600; color: var(--pink); display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* ── STATS BAR ── */
    .stats-bar-wrapper {
      position: relative; z-index: 10;
      margin-top: -60px; /* Overlap hero */
      width: 90vw; margin-left: auto; margin-right: auto;
    }
    .stats-bar {
      background: linear-gradient(90deg, rgba(233,30,140,0.95) 0%, rgba(61,0,64,0.95) 100%);
      backdrop-filter: blur(10px);
      padding: 36px 0;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stats-inner {
      width: 100%; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 48px; gap: 20px; flex-wrap: wrap;
    }
    .stat-item { 
      display: flex; align-items: center; gap: 16px; color: white; 
      flex: 1; justify-content: center; position: relative; min-width: 180px;
    }
    .stat-item:not(:last-child)::after {
      content: ''; position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
      width: 1px; height: 32px; background: rgba(255,255,255,0.15);
    }
    .stat-icon-wrapper {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6eb4, #e91e8c);
      box-shadow: 0 0 0 6px rgba(233,30,140,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; transform: translateY(-2px);
    }
    .stat-num {
      font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; line-height: 1.1; margin-bottom: 2px;
    }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.85); white-space: nowrap; }

    /* ── SECTION COMMONS ── */
    .section { padding: 80px 48px; }
    .section-max { width: 90vw; max-width: none; margin: 0 auto; }
    .eyebrow { text-align: center; color: var(--pink); font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px; font-weight: 700; text-align: center; color: var(--dark);
      margin-bottom: 8px;
    }
    .title-accent {
      display: block; width: 60px; height: 3px;
      background: linear-gradient(to right, var(--pink), var(--pink-light));
      margin: 14px auto 48px; border-radius: 4px;
    }

    /* ── PROFILES ── */
    .profiles-section { background: #fffafb; }
    .profiles-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 36px;
    }
    .btn-view-all {
      border: 1px solid rgba(233,30,140,0.3); color: var(--pink); background: white;
      padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 10px rgba(233,30,140,0.05);
    }
    .btn-view-all:hover { background: var(--pink); color: white; border-color: var(--pink); transform: translateY(-2px); }
    .heart-divider {
      display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;
    }
    .heart-divider::before, .heart-divider::after {
      content: ''; width: 30px; height: 1.5px; background: rgba(233,30,140,0.3);
    }
    .heart-divider-icon { color: var(--pink); font-size: 14px; }
    .profiles-grid-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; }
    
    .profiles-grid.expanded {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; width: 100%;
    }
    .profiles-grid.compact {
      display: flex; justify-content: center; width: 100%;
    }
    .profiles-grid.compact .profile-card {
      width: 100%; max-width: 320px;
    }

    .slider-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--pink); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; box-shadow: 0 4px 15px rgba(233,30,140,0.3);
      z-index: 10; transition: all 0.2s;
    }
    .slider-arrow:hover { background: var(--pink-dark); transform: translateY(-50%) scale(1.1); }
    .slider-arrow.left { left: 0; }
    .slider-arrow.right { right: 0; }
    .profile-card {
      border-radius: 16px; overflow: hidden;
      background: #111; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      transition: all 0.4s; cursor: pointer; position: relative;
      aspect-ratio: 3/4.2;
    }
    .profile-card:hover { transform: translateY(-8px); box-shadow: 0 16px 40px rgba(233,30,140,0.25); }
    .profile-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .profile-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 40%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 16px 14px;
    }
    .profile-name { font-weight: 700; font-size: 16px; color: white; font-family: 'Inter', sans-serif; }
    .profile-loc { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag {
      background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(4px); font-size: 10px; padding: 4px 10px; border-radius: 20px;
    }

    /* ── CTA BANNER ── */
    .cta-banner {
      width: 90vw; max-width: none; margin: 40px auto 0;
      background: linear-gradient(135deg, #d81b60 0%, #880e4f 100%); border-radius: 20px;
      padding: 40px 48px; display: flex; align-items: center; justify-content: space-between;
      gap: 40px; position: relative; overflow: hidden;
      box-shadow: 0 20px 40px rgba(233,30,140,0.3);
    }
    .cta-left-content {
      display: flex; align-items: center; gap: 40px; position: relative; z-index: 2;
    }
    .cta-img {
      width: 200px; height: 100%; max-height: 250px; object-fit: contain; object-position: bottom;
      border-radius: 50%; border: 4px solid var(--pink); flex-shrink: 0;
    }
    .cta-text h2 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; color: white; }
    .cta-text p { font-size: 17px; color: rgba(255,255,255,0.9); margin-bottom: 16px; }
    .cta-badges-small { display: flex; flex-wrap: wrap; gap: 16px; }
    .cta-badge-sm { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; }
    .cta-badge-sm .icon { color: var(--pink-light); }

    .cta-right-content { text-align: center; position: relative; z-index: 2; }
    .btn-join-white {
      background: white; color: var(--pink); border: none;
      padding: 14px 40px; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    }
    .btn-join-white:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); }
    .cta-note { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 10px; }
    .cta-arrow-svg { position: absolute; bottom: -5px; left: -50px; width: 40px; opacity: 0.8; }

    /* ── SUCCESS STORIES CAROUSEL ── */
    .stories-section { background: white; }
    .stories-carousel {
      overflow: hidden;
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      padding: 20px 0;
    }
    .stories-track {
      display: flex; gap: 20px;
      animation: scrollMarquee 40s linear infinite;
      width: max-content;
    }
    .stories-track:hover { animation-play-state: paused; }
    .story-card {
      background: white; border-radius: 16px; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      transition: all 0.4s; width: 400px; flex-shrink: 0;
      display: flex; overflow: hidden; border: 1.5px solid rgba(233,30,140,0.25);
    }
    .story-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(233,30,140,0.15); border-color: rgba(233,30,140,0.3); }
    .story-img-wrapper { width: 40%; flex-shrink: 0; }
    .story-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .story-content { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .story-text { font-size: 13px; line-height: 1.6; color: #4b5563; margin-bottom: 16px; flex: 1; font-style: italic; }
    .couple-name { font-weight: 700; font-size: 13px; color: var(--dark); margin-bottom: 4px; }
    .couple-loc  { font-size: 11px; color: var(--gray); }

    /* ── WHY CHOOSE ── */
    .why-section { background: white; padding-bottom: 40px; }
    .why-banner {
      background: #fff0f6; border-radius: 20px; padding: 40px;
      margin-top: 16px;
    }
    .why-grid { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .why-item { display: flex; align-items: flex-start; gap: 16px; flex: 1; }
    .why-icon-wrapper {
      width: 80px; height: 80px; border-radius: 50%;
      background: white; border: 2px solid var(--pink-dark);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 8px 20px rgba(233,30,140,0.15);
    }
    .why-icon-wrapper span {
      font-size: 40px !important; color: transparent; text-shadow: 0 0 0 var(--pink-dark);
    }
    .why-item h4 { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .why-item p  { font-size: 11px; color: var(--gray); line-height: 1.4; }

    /* ── FEATURE DETAILS ── */
    .feature-detail-section { padding-top: 40px; }
    .feature-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px; margin-top: 40px;
    }
    .feature-card {
      background: white; border-radius: 20px; padding: 40px;
      box-shadow: 0 10px 30px rgba(233,30,140,0.08);
      border: 1px solid rgba(233,30,140,0.05);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .feature-card:hover {
      transform: translateY(-5px); box-shadow: 0 15px 40px rgba(233,30,140,0.15);
    }
    .feature-icon-large {
      width: 80px; height: 80px; border-radius: 50%;
      background: white; border: 2px solid var(--pink-dark);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 8px 20px rgba(233,30,140,0.15);
      margin-bottom: 24px;
    }
    .feature-icon-large span {

    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.invisible');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              observer.unobserve(e.target);
            }
          });
        }, { threshold: 0.12 });
        els.forEach(el => observer.observe(el));
        return () => observer.disconnect();
      });
    }

    function useScrollProgress() {
      const [progress, setProgress] = useState(0);
      useEffect(() => {
        const handler = () => {
          const scrolled = window.scrollY;
          const total = document.documentElement.scrollHeight - window.innerHeight;
          setProgress(total > 0 ? (scrolled / total) * 100 : 0);
        };
        window.addEventListener('scroll', handler);
        return () => window.removeEventListener('scroll', handler);
      }, []);
      return progress;
    }

    /* ─── MAIN SPLASH ─── */
    function MainSplash({ onDone }) {
      const [step, setStep] = useState(0);
      const steps = ['Finding your perfect match...', 'Preparing the experience...', 'Welcome to LoveConnect'];

      useEffect(() => {
        let t;
        if (step < steps.length - 1) {
          t = setTimeout(() => setStep(s => s + 1), 1200);
        } else {
          t = setTimeout(onDone, 1200);
        }
        return () => clearTimeout(t);
      }, [step]);

      return (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 99999,
          background: 'var(--white)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          animation: step === steps.length - 1 ? 'splashOut 0.8s 0.8s ease forwards' : 'none'
        }}>
          <div style={{ fontSize: 90, animation: 'heartPump 1.5s infinite', marginBottom: 32, filter: 'drop-shadow(0 0 20px rgba(233,30,140,0.3))' }}>💗</div>
          <h1 style={{ fontFamily: 'Playfair Display', color: 'var(--dark)', fontSize: 32, fontWeight: 700, marginBottom: 40 }}>LoveConnect</h1>
          
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16, height: 60 }}>
            {steps.map((s, i) => (
              i === step && (
                <div key={i} style={{ animation: 'connectFade 0.5s ease', color: 'var(--gray)', fontSize: 16, fontWeight: 500 }}>
                  {s}
                </div>
              )
            ))}
          </div>
          
          {/* Loading bar */}
          <div style={{ width: 200, height: 4, background: 'rgba(233,30,140,0.1)', borderRadius: 4, overflow: 'hidden', marginTop: 20 }}>
            <div style={{ 
              height: '100%', background: 'linear-gradient(90deg, var(--pink), var(--pink-light))',
              width: `${((step + 1) / steps.length) * 100}%`, transition: 'width 1s ease'
            }} />
          </div>
        </div>
      );
    }

    /* ─── APP ─── */
    function App() {
      const progress = useScrollProgress();
      const [splashDone, setSplashDone] = useState(false);
      useReveal();
      const [isLoginOpen, setIsLoginOpen] = useState(false);
      const [isUserBoxOpen, setIsUserBoxOpen] = useState(false);
      const [selectedProfile, setSelectedProfile] = useState(null);
      const [loggedInUser, setLoggedInUser] = useState(null);

      const [appProfiles, setAppProfiles] = useState(profiles);
      const [appStories, setAppStories] = useState(stories);
      const [globalData, setGlobalData] = useState(null);

      useEffect(() => {
        db.collection('website_content').doc('global').get().then(doc => {
          if (doc.exists) setGlobalData(doc.data());
        });

        db.collection('profiles').onSnapshot(snap => {
          if (!snap.empty) {
            const p = [];
            snap.forEach(doc => p.push(doc.data()));
            setAppProfiles(p);
          }
        });

        db.collection('testimonials').onSnapshot(snap => {
          if (!snap.empty) {
            const s = [];
            snap.forEach(doc => s.push(doc.data()));
            setAppStories(s);
          }
        });
      }, []);

      return (
        <>
          {!splashDone && <MainSplash onDone={() => setSplashDone(true)} />}
          <div className="scroll-progress" style={{ width: `${progress}%` }} />
          <Navbar onLoginClick={() => setIsLoginOpen(true)} loggedInUser={loggedInUser} onUserClick={() => setIsUserBoxOpen(true)} />
          <Hero g={globalData} />
          <StatsBar g={globalData} />
          <ProfilesSection onSelectProfile={setSelectedProfile} profilesData={appProfiles} />
          <CtaBanner g={globalData} />
          <StoriesSection storiesData={appStories} />
          <WhySection g={globalData} />
          <FooterCta g={globalData} />
          <Footer />
          <LoginModal isOpen={isLoginOpen} onClose={() => setIsLoginOpen(false)} setLoggedInUser={setLoggedInUser} />
          <ProfileModal profile={selectedProfile} onClose={() => setSelectedProfile(null)} />
          <UserProfileModal isOpen={isUserBoxOpen} user={loggedInUser} onClose={() => setIsUserBoxOpen(false)} />
        </>
      );
    }

    /* ─── NAVBAR ─── */
    function Navbar({ onLoginClick, loggedInUser, onUserClick }) {
      const [scrolled, setScrolled] = useState(false);
      const [heartClicks, setHeartClicks] = useState(0);

      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 30);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);

      const handleHeartClick = (e) => {
        e.preventDefault();
        setHeartClicks(prev => {
          const newClicks = prev + 1;
          if (newClicks >= 12) {
            const pwd = prompt("Admin Panel Password:");
            if (pwd === "lovedate@123") {
              window.open("admin.html", "_blank");
            } else if (pwd) {
              alert("Incorrect password!");
            }
            return 0;
          }
          return newClicks;
        });
      };

      return (
        <nav className="navbar" style={{ background: scrolled ? 'rgba(10,0,15,0.95)' : 'transparent', backdropFilter: scrolled ? 'blur(10px)' : 'none' }}>
          <a className="logo" href="#">
            <span className="logo-icon" onClick={handleHeartClick} style={{cursor: 'pointer'}}>💗</span>
            <div>
              <div className="logo-text">LoveConnect</div>
              <div className="logo-sub">Find Love. Build Forever.</div>
            </div>
          </a>
          <ul className="nav-links">
            {['Home', 'Matches', 'Events', 'Success Stories', 'Pricing'].map((l, i) => (
              <li key={i}><a href="#" className={i === 0 ? 'active' : ''}>{l}</a></li>
            ))}
          </ul>
          <div style={{ display: 'flex', gap: '12px' }}>
            {loggedInUser?.isAdmin && (
              <button className="btn-login desktop-only" style={{ background: 'var(--dark)', color: 'white' }} onClick={() => window.open('admin.html', '_blank')}>🛠️ Admin Panel</button>
            )}
            {loggedInUser ? (
              <button className="btn-login" onClick={(e) => { e.preventDefault(); onUserClick(); }}><span className="icon">👤</span> {loggedInUser.name}</button>
            ) : (
              <button className="btn-login" onClick={(e) => { e.preventDefault(); onLoginClick(); }}><span className="icon">👤</span> Login</button>
            )}
          </div>
        </nav>
      );
    }

    /* ─── PROFILES ─── */
    function ProfilesSection({ onSelectProfile, profilesData }) {
      const [viewMode, setViewMode] = useState('compact');
      const [currentIndex, setCurrentIndex] = useState(0);

      const handlePrev = () => {
        setCurrentIndex(prev => (prev === 0 ? profilesData.length - 1 : prev - 1));
      };
      
      const handleNext = () => {
        setCurrentIndex(prev => (prev === profilesData.length - 1 ? 0 : prev + 1));
      };

      const toggleViewMode = () => {
        setViewMode(prev => prev === 'compact' ? 'expanded' : 'compact');
        if (viewMode === 'expanded') setCurrentIndex(0); // Reset index when collapsing
      };

      return (
        <section className="section profiles-section">
          <div className="section-max">
            <div className="eyebrow invisible" style={{ marginBottom: 4 }}>DISCOVER AMAZING PEOPLE</div>
            <div className="profiles-header invisible" style={{ transitionDelay: '0.1s', position: 'relative' }}>
              <div style={{ width: '100%', textAlign: 'center' }}>
                <h2 className="section-title" style={{ marginBottom: 12 }}>Featured Female Profiles</h2>
                <div className="heart-divider"><span className="heart-divider-icon">♥</span></div>
              </div>
              <button onClick={toggleViewMode} className="btn-view-all" style={{ position: 'absolute', right: 0, top: 0 }}>
                {viewMode === 'compact' ? 'View All Profiles →' : 'Show Less ←'}
              </button>
            </div>
            
            <div className="profiles-grid-wrapper" style={{ minHeight: viewMode === 'compact' ? 450 : 'auto', transition: 'min-height 0.3s' }}>
              {viewMode === 'compact' && profilesData.length > 1 && (
                <button onClick={handlePrev} className="slider-arrow left">❮</button>
              )}
              
              <div className={`profiles-grid ${viewMode}`}>
                {profilesData.map((p, i) => {
                  if (viewMode === 'compact' && i !== currentIndex) return null;
                  
                  return (
                    <div key={i} className="profile-card" style={{ cursor: 'pointer', animation: viewMode === 'compact' ? 'fadeIn 0.4s ease' : 'none' }} onClick={() => onSelectProfile(p)}>
                      <img src={p.img} alt={p.name} className="profile-img" />
                      <div className="profile-overlay">
                        <div className="profile-name">{p.name}, {p.age}</div>
                        <div className="profile-loc">{p.city}, {p.state}</div>
                        <div className="profile-tags">
                          {p.tags && p.tags.map((t, j) => <span key={j} className="tag">{t}</span>)}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>

              {viewMode === 'compact' && profilesData.length > 1 && (
                <button onClick={handleNext} className="slider-arrow right">❯</button>
              )}
            </div>
          </div>
        </section>
      );
    }

    /* ─── CTA BANNER ─── */
    function CtaBanner({ g }) {
      return (
        <div className="cta-banner invisible from-scale">
          <div className="cta-left-content">
            <img src={g?.cta1Img || "./looking.png"} alt="Looking" className="cta-img" />
            <div className="cta-text">
              <h2>{g?.cta1Title || 'Looking For Someone Special?'}</h2>
              <p>{g?.cta1Desc || 'Join our community and find your perfect match today!'}</p>
              <div className="cta-badges-small">
                {['✅ Easy Registration','✅ 100% Free','💗 Verified Profiles','🔒 Secure & Private'].map((b, i) => (
                  <span key={i} className="cta-badge-sm">{b}</span>
                ))}
              </div>
            </div>
          </div>
          <div className="cta-right-content">
            <button className="btn-join-white"><span className="icon" style={{color: '#e91e8c'}}>👥</span> Join Us</button>
            <div className="cta-note">It only takes a minute!</div>
            <svg className="cta-arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M90 10C80 40 50 60 10 90 M10 90 L30 85 M10 90 L20 70" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        </div>
      );
    }

    /* ─── STORIES ─── */
    function StoriesSection({ storiesData }) {
      return (
        <section className="section stories-section">
          <div className="section-max">
            <div className="eyebrow invisible" style={{ marginBottom: 4 }}>SUCCESS STORIES</div>
            <div className="profiles-header invisible" style={{ transitionDelay: '0.1s', position: 'relative' }}>
              <div style={{ width: '100%', textAlign: 'center' }}>
                <h2 className="section-title" style={{ marginBottom: 12 }}>Real People, Real Love</h2>
                <div className="heart-divider"><span className="heart-divider-icon">♥</span></div>
              </div>
            </div>
            
            <div className="stories-carousel">
              <div className="stories-track">
                {[...storiesData, ...storiesData].map((s, i) => (
                  <div key={i} className="story-card">
                    <div className="story-img-wrapper">
                      <img src={s.img} alt={s.names} className="story-img" />
                    </div>
                    <div className="story-content">
                      <div className="stars">
                        {'★'.repeat(5).split('').map((star,j) => <span key={j} style={{color:'#e91e8c', fontSize: 16, marginRight: 2}}>{star}</span>)}
                      </div>
                      <div className="story-text">"{s.text}"</div>
                      <div className="couple-name">– {s.names}</div>
                      <div className="couple-loc">{s.city}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── WHY CHOOSE ─── */
    function WhySection({ g }) {
      return (
        <section className="section why-section">
          <div className="section-max">
            <div className="eyebrow invisible" style={{ marginBottom: 4 }}>{g?.whyEyebrow || 'WHY CHOOSE LOVE CONNECT?'}</div>
            <div className="why-banner invisible from-scale">
              <div className="why-grid">
                {whyChoose.map((w, i) => (
                  <div key={i} className="why-item">
                    <div className="why-icon-wrapper">
                       <span>{w.icon}</span>
                    </div>
                    <div>
                      <h4>{w.title}</h4>
                      <p>{w.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="feature-grid">
              {whyDetails.map((f, index) => {
                return (
                  <div key={index} className="feature-card invisible from-scale" style={{ transitionDelay: `${index * 0.1}s` }}>
                    <div className="feature-icon-large">
                      {f.icon === '🛡️' ? <span style={{fontSize: 28}}>🛡️</span> : null} 
                      {f.icon === '🔒' ? <span style={{fontSize: 28}}>🔒</span> : null}
                      {f.icon === '👥' ? <span style={{fontSize: 28}}>👥</span> : null}
                      {f.icon === '❤️' ? <span style={{fontSize: 28}}>❤️</span> : null}
                      {f.icon === '🎧' ? <span style={{fontSize: 28}}>🎧</span> : null}
                    </div>
                    <h3>{f.title}</h3>
                    <p>{f.desc}</p>
                    <ul className="feature-list">
                      {f.points.map((pt, i) => (
                        <li key={i}><span className="icon">✓</span> {pt}</li>
                      ))}
                    </ul>
                  </div>
                );
              })}
            </div>

          </div>
        </section>
      );
    }

    /* ─── FOOTER CTA ─── */
    function FooterCta({ g }) {
      return (
        <div className="section-max invisible from-scale" style={{ padding: '0 48px', position: 'relative', top: '40px', zIndex: 10 }}>
          <div className="footer-cta-box">
            <div className="footer-cta-content">
              <img src={g?.cta2Img || "./couple.png"} alt="Couple" className="footer-cta-img" />
              <div className="footer-cta-text">
                <h2>{g?.cta2Title || 'Ready To Start Your Journey?'}</h2>
                <p>{g?.cta2Desc || 'Join thousands of happy members and find someone special today!'}</p>
              </div>
            </div>
            <div className="footer-cta-btn-wrapper">
              <button className="btn-join-white" style={{ margin: '0 auto' }}><span className="icon" style={{color: '#e91e8c'}}>👥</span> Join Us</button>
              <div style={{ color: 'rgba(255,255,255,0.8)', fontSize: 12, marginTop: 8 }}>It only takes a minute!</div>
            </div>
          </div>
        </div>
      );
    }

    /* ─── FOOTER ─── */
    function Footer() {
      // Generate some crystal hearts
      const crystalHearts = Array.from({ length: 20 }).map((_, i) => ({
        id: i,
        left: `${Math.random() * 100}%`,
        delay: `${Math.random() * 15}s`,
        duration: `${15 + Math.random() * 20}s`,
        size: `${12 + Math.random() * 16}px`
      }));

      return (
        <footer className="footer">
          {crystalHearts.map(h => (
            <span key={h.id} className="crystal-heart" style={{
              left: h.left,
              animationDelay: h.delay,
              animationDuration: h.duration,
              fontSize: h.size
            }}>✦</span>
          ))}
          <div className="footer-grid">
            <div className="footer-logo">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 22 }}>💗</span>
                <div>
                  <div className="logo-text" style={{ color: '#e91e8c' }}>LoveConnect</div>
                  <div className="logo-sub">Find Love. Build Forever.</div>
                </div>
              </div>
              <p className="footer-about">LoveConnect is a trusted platform where real people come together to build meaningful relationships that last a lifetime.</p>
              <div className="social-links">
                {['f','📷','🐦','▶'].map((s, i) => <button key={i} className="social-btn">{s}</button>)}
              </div>
            </div>
            <div className="footer-col">
              <h5>Quick Links</h5>
              <ul>
                {['About Us','How It Works','Success Stories','Blog','Contact Us'].map((l, i) => (
                  <li key={i}><a href="#">{l}</a></li>
                ))}
              </ul>
            </div>
            <div className="footer-col">
              <h5>Contact Us</h5>
              <div className="footer-contact">
                <div className="contact-item">📞 +91 98765 43210</div>
                <div className="contact-item">✉️ support@loveconnect.com</div>
                <div className="contact-item">📍 Kolkata, West Bengal, India</div>
                <div className="contact-item">🕒 Mon–Sun: 9AM–9PM</div>
              </div>
            </div>
            <div className="footer-col">
              <h5>Subscribe To Our Newsletter</h5>
              <p style={{ fontSize: 13, marginBottom: 12 }}>Get updates about new members and special offers straight to your inbox.</p>
              <div className="subscribe-row">
                <input type="email" placeholder="Enter your email" />
                <button className="btn-subscribe">Subscribe</button>
              </div>
            </div>
          </div>
          <div className="footer-bottom">
            <span>© 2024 LoveConnect. All Rights Reserved.</span>
            <div>
              <a href="#">Privacy Policy</a>
              <a href="#">Terms &amp; Conditions</a>
            </div>
          </div>
        </footer>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
